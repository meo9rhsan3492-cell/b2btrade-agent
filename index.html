let currentTab = 0;
let stepIntervals = [];

function showTab(idx, btn) {
  currentTab = idx;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Clear all intervals
  stepIntervals.forEach(clearInterval);
  stepIntervals = [];

  const data = TAB_DATA[idx];
  const content = document.getElementById('tab-content');
  content.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.style.marginBottom = '12px';
  header.innerHTML = `<div style="color:#667eea;font-weight:700;margin-bottom:4px">${data.label}</div><div style="color:#555;font-size:0.78rem">${data.desc}</div>`;
  content.appendChild(header);

  // Steps container
  const stepsEl = document.createElement('div');
  stepsEl.style.marginBottom = '10px';
  content.appendChild(stepsEl);

  // Result container
  const resultEl = document.createElement('div');
  resultEl.style.display = 'none';
  resultEl.className = 'result-panel';
  content.appendChild(resultEl);

  // Animate steps
  let stepIdx = 0;
  let stepTimeout = null;

  function addStep() {
    if (stepIdx >= data.steps.length) {
      // Show result
      stepTimeout = setTimeout(() => {
        resultEl.style.display = 'block';
        resultEl.className = 'result-panel fade-in';
        resultEl.innerHTML = data.result;
      }, 400);
      return;
    }

    const el = document.createElement('div');
    el.style.color = '#28c840';
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.15s';
    el.style.marginBottom = '3px';
    stepsEl.appendChild(el);

    // Typing effect
    const text = data.steps[stepIdx];
    let charIdx = 0;
    el.style.opacity = '1';

    const typeInterval = setInterval(() => {
      if (charIdx < text.length) {
        el.textContent += text[charIdx++];
      } else {
        clearInterval(typeInterval);
        stepIdx++;
        const delay = stepIdx >= data.steps.length ? 300 : 350;
        stepTimeout = setTimeout(addStep, delay);
      }
    }, 18 + Math.random() * 22);

    stepIntervals.push(typeInterval);
  }

  stepTimeout = setTimeout(addStep, 300);
  stepIntervals.push(null); // marker
}

// Auto-play first tab
window.addEventListener('load', () => {
  setTimeout(() => {
    const firstBtn = document.querySelector('.tab-btn');
    if (firstBtn) showTab(0, firstBtn);
  }, 600);
});
</script>
